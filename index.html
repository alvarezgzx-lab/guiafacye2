                    borderColor: 'border-cyan-200',
                    textColor: 'text-cyan-900',
                    pda: 'Exige que las autoridades rindan cuentas y no oculten información.',
                    conceptos: [
                        { 
                            termino: 'Derecho a la Información', 
                            icono: '📄', 
                            definicion: 'Es tu derecho humano investigar, solicitar y recibir documentos o datos generados por el gobierno.',
                            ejemplo: 'Usar la Plataforma Nacional de Transparencia para pedirle a tu municipio el contrato de compra de las patrullas.'
                        },
                        { 
                            termino: 'Transparencia', 
                            icono: '🔍', 
                            definicion: 'Es la "vitrina" que permite ver qué hacen los funcionarios. Existe la transparencia proactiva (publicar todo sin que se lo pidan).',
                            ejemplo: 'Un portal de internet donde cualquiera puede ver cuánto gana el presidente o un maestro.'
                        },
                        { 
                            termino: 'Rendición de Cuentas', 
                            icono: '📊', 
                            definicion: 'Obligación del gobierno de justificar y explicar frente a los ciudadanos en qué y por qué gastó los recursos públicos.',
                            ejemplo: 'El director de tu escuela haciendo una junta para explicar ticket por ticket en qué se usó la cuota escolar.'
                        }
                    ]
                }
            ];

            useEffect(() => {
                initQuiz();
            }, []);

            const initQuiz = () => {
                const shuffledQuestions = [...bancoReactivos].sort(() => Math.random() - 0.5).map(q => {
                    const opcionesOriginales = q.opciones.map((texto, index) => ({ texto, isCorrect: index === q.correcta }));
                    const opcionesMezcladas = opcionesOriginales.sort(() => Math.random() - 0.5);
                    
                    return {
                        pregunta: q.pregunta,
                        tema: q.tema,
                        explicacion: q.explicacion,
                        opciones: opcionesMezcladas.map(o => o.texto),
                        correctIndex: opcionesMezcladas.findIndex(o => o.isCorrect)
                    };
                });

                setQuestions(shuffledQuestions);
                setQuizAnswers({});
                setShowResults(false);
            };

            const handleAnswer = (questionIndex, answerIndex) => {
                setQuizAnswers({ ...quizAnswers, [questionIndex]: answerIndex });
            };

            const calculateScore = () => {
                let correct = 0;
                questions.forEach((q, index) => {
                    if (quizAnswers[index] === q.correctIndex) correct++;
                });
                return correct;
            };

            const getAnswerColor = (qIndex, optIndex) => {
                if (!quizAnswers.hasOwnProperty(qIndex)) return 'bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-700';
                
                const isSelected = quizAnswers[qIndex] === optIndex;
                const isCorrect = optIndex === questions[qIndex].correctIndex;
                
                if (isSelected && isCorrect) return 'bg-emerald-100 border-2 border-emerald-500 text-emerald-900 shadow-sm';
                if (isSelected && !isCorrect) return 'bg-rose-100 border-2 border-rose-500 text-rose-900';
                if (isCorrect) return 'bg-emerald-50 border-2 border-emerald-400 text-emerald-800'; 
                return 'bg-slate-50 border-2 border-slate-200 text-slate-400 opacity-60';
            };

            const InicioView = () => (
                <div className="max-w-5xl mx-auto p-6 md:p-10 animate-fade-in">
                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                        <div className="bg-gradient-to-br from-indigo-600 via-purple-600 to-fuchsia-600 p-12 text-center text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 -mt-10 -mr-10 opacity-10">
                                <i className="fa-solid fa-book-open text-[250px]"></i>
                            </div>
                            <div className="relative z-10 flex flex-col items-center">
                                <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm mb-6 inline-block shadow-lg">
                                    <i className="fa-solid fa-shield-halved text-5xl text-white"></i>
                                </div>
                                <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">
                                    Simulador Interactivo
                                </h1>
                                <h2 className="text-2xl md:text-3xl font-medium text-indigo-100 mb-2">
                                    Formación Cívica y Ética (2do Trimestre)
                                </h2>
                                <p className="text-lg md:text-xl text-fuchsia-100 mt-4 max-w-2xl mx-auto">
                                    Evalúa tu comprensión de los 7 Procesos de Desarrollo de Aprendizaje (PDA), los tipos de normas y los escenarios de participación ciudadana.
                                </p>
                            </div>
                        </div>

                        <div className="p-8 md:p-12">
                            <div className="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                                <div className="bg-slate-50 border-2 border-slate-200 rounded-2xl p-8 hover:shadow-lg transition-all group flex flex-col justify-between">
                                    <div>
                                        <div className="bg-fuchsia-100 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-sm">
                                            <i className="fa-solid fa-book-open text-3xl text-fuchsia-600"></i>
                                        </div>
                                        <h3 className="text-2xl font-bold text-slate-800 mb-3">Guía de Conceptos</h3>
                                        <p className="text-slate-600 leading-relaxed mb-6">
                                            Repasa visualmente la teoría: Tipos de normas, mecanismos de participación, división de poderes, cultura de paz y derechos humanos.
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => setActiveSection('conceptos')}
                                        className="w-full flex items-center justify-center gap-3 bg-white border-2 border-fuchsia-600 text-fuchsia-600 px-6 py-4 rounded-xl font-bold hover:bg-fuchsia-50 transition-colors"
                                    >
                                        Explorar Teoría <i className="fa-solid fa-book-open"></i>
                                    </button>
                                </div>

                                <div className="bg-gradient-to-br from-indigo-50 to-purple-50 border-2 border-indigo-200 rounded-2xl p-8 hover:shadow-lg transition-all group flex flex-col justify-between">
                                    <div>
                                        <div className="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-md">
                                            <i className="fa-solid fa-bullseye text-3xl text-white"></i>
                                        </div>
                                        <h3 className="text-2xl font-bold text-slate-800 mb-3">Simulador Interactivo</h3>
                                        <p className="text-slate-600 leading-relaxed mb-6">
                                            Evalúa tu comprensión con 15 reactivos aleatorios basados en casos prácticos del Trimestre 2. Recibe retroalimentación inmediata.
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => setActiveSection('simulacro')}
                                        className="w-full flex items-center justify-center gap-3 bg-indigo-600 text-white px-6 py-4 rounded-xl font-bold hover:bg-indigo-700 hover:shadow-md transition-all"
                                    >
                                        Comenzar Prueba <i className="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ConceptosView = () => (
                <div className="max-w-5xl mx-auto p-4 md:p-8 animate-fade-in">
                    <div className="sticky top-0 z-50 bg-slate-50/90 backdrop-blur-md pt-4 pb-4 mb-8 border-b border-slate-200 flex items-center gap-4">
                        <button 
                            onClick={() => setActiveSection('inicio')}
                            className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium transition-colors bg-white px-5 py-2.5 rounded-full shadow-sm border border-slate-200"
                        >
                            <i className="fa-solid fa-house"></i> <span className="hidden sm:inline">Volver</span>
                        </button>
                        <h2 className="text-2xl md:text-3xl font-extrabold text-slate-800 flex-1 truncate">
                            Guía de Conceptos (2T)
                        </h2>
                    </div>

                    <div className="space-y-12">
                        {conceptosClave.map((tema, index) => (
                            <div key={tema.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-lg transition-shadow">
                                <div className={`bg-gradient-to-r ${tema.color} p-6 md:p-8 text-white`}>
                                    <div className="flex items-start gap-4 mb-4">
                                        <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-sm shadow-inner flex items-center justify-center">
                                            <i className={`${tema.icon} text-3xl`}></i>
                                        </div>
                                        <div className="pt-1">
                                            <h3 className="text-2xl md:text-3xl font-bold mb-2">
                                                {index + 1}. {tema.titulo}
                                            </h3>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 md:p-8 bg-slate-50/50">
                                    <div className="grid md:grid-cols-2 gap-6">
                                        {tema.conceptos.map((concepto, i) => (
                                            <div key={i} className={`bg-white p-6 rounded-2xl border ${tema.borderColor} shadow-sm transition-transform hover:-translate-y-1 flex flex-col h-full`}>
                                                <div className="flex items-center gap-3 mb-4">
                                                    <span className="text-3xl">{concepto.icono}</span>
                                                    <h5 className={`font-bold text-xl ${tema.textColor}`}>{concepto.termino}</h5>
                                                </div>
                                                
                                                <div className="space-y-4 flex-grow flex flex-col">
                                                    <div className="flex-grow">
                                                        <span className={`text-xs font-bold uppercase tracking-wider ${tema.textColor} opacity-70 block mb-2`}>Concepto</span>
                                                        <p className="text-slate-700 text-base leading-relaxed">
                                                            {concepto.definicion}
                                                        </p>
                                                    </div>
                                                    
                                                    <div className={`mt-4 p-4 rounded-xl border ${tema.bgColor} ${tema.borderColor} bg-opacity-40`}>
                                                        <span className={`text-xs font-bold uppercase tracking-wider ${tema.textColor} opacity-80 block mb-1 flex items-center gap-1`}>
                                                            <i className="fa-solid fa-lightbulb"></i> Ejemplo
                                                        </span>
                                                        <p className="text-slate-700 text-sm leading-relaxed italic font-medium">
                                                            "{concepto.ejemplo}"
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const SimulacroView = () => {
                const score = calculateScore();
                const totalQuestions = questions.length;
                const answeredCount = Object.keys(quizAnswers).length;
                const progress = (answeredCount / totalQuestions) * 100;
                const isCompleted = answeredCount === totalQuestions;

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8 animate-fade-in">
                        <div className="sticky top-0 z-50 bg-slate-50/90 backdrop-blur-md pt-4 pb-4 mb-8 border-b border-slate-200 flex justify-between items-center">
                            <button 
                                onClick={() => setActiveSection('inicio')}
                                className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium transition-colors bg-white px-5 py-2.5 rounded-full shadow-sm border border-slate-200"
                            >
                                <i className="fa-solid fa-house"></i> <span className="hidden sm:inline">Volver</span>
                            </button>
                            
                            <div className="flex-1 max-w-xs mx-4">
                                <div className="flex justify-between text-sm font-bold text-indigo-900 mb-1">
                                    <span>Progreso</span>
                                    <span>{answeredCount} / {totalQuestions}</span>
                                </div>
                                <div className="w-full bg-indigo-100 rounded-full h-3">
                                    <div 
                                        className="bg-gradient-to-r from-indigo-500 to-fuchsia-500 h-3 rounded-full transition-all duration-500 shadow-inner" 
                                        style={{ width: `${progress}%` }}
                                    ></div>
                                </div>
                            </div>

                            {isCompleted && !showResults && (
                                <button 
                                    onClick={() => { setShowResults(true); window.scrollTo(0, 0); }}
                                    className="flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2.5 rounded-full font-bold shadow-md transition-colors animate-pulse"
                                >
                                    Evaluar <i className="fa-solid fa-medal"></i>
                                </button>
                            )}
                        </div>

                        {showResults && (
                            <div className="mb-12 animate-fade-in-up">
                                <div className={`bg-white rounded-3xl p-10 text-center shadow-2xl border-t-8 ${score >= 12 ? 'border-emerald-500' : score >= 9 ? 'border-amber-400' : 'border-rose-500'}`}>
                                    <div className={`inline-flex p-6 rounded-full mb-6 ${score >= 12 ? 'bg-emerald-50 text-emerald-500' : score >= 9 ? 'bg-amber-50 text-amber-500' : 'bg-rose-50 text-rose-500'}`}>
                                        <i className="fa-solid fa-medal text-7xl"></i>
                                    </div>
                                    <h2 className="text-5xl font-extrabold text-slate-800 mb-4">
                                        {score} <span className="text-3xl text-slate-400 font-medium">/ {totalQuestions} aciertos</span>
                                    </h2>
                                    <p className="text-2xl font-medium text-slate-600 mb-8">
                                        {score >= 12 ? '¡Excelente nivel analítico! Tienes una sólida cultura ciudadana y dominas las temáticas del trimestre. 🌟' : 
                                         score >= 9 ? 'Buen trabajo. Repasa las retroalimentaciones en las preguntas sobre normas o instituciones. 👍' : 
                                         'Es necesario reforzar conceptos. ¡No te desanimes, revisa tus errores en la guía de estudio y aprende de ellos! 📚'}
                                    </p>
                                    <button 
                                        onClick={initQuiz}
                                        className="inline-flex items-center justify-center gap-3 px-8 py-4 font-bold text-white transition-all bg-slate-800 rounded-xl hover:bg-slate-700 shadow-lg text-lg"
                                    >
                                        <i className="fa-solid fa-rotate-right"></i> Intentar Nuevo Simulacro
                                    </button>
                                </div>
                            </div>
                        )}

                        <div className="space-y-10">
                            {questions.map((q, qIndex) => {
                                const isAnswered = quizAnswers.hasOwnProperty(qIndex);
                                
                                return (
                                    <div key={qIndex} className={`bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-300 ${isAnswered ? 'opacity-100' : 'hover:shadow-lg'}`}>
                                        <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex flex-wrap justify-between items-center gap-2">
                                            <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-800 font-bold text-sm">
                                                {qIndex + 1}
                                            </span>
                                            <span className="text-xs font-bold uppercase tracking-wider text-fuchsia-600 bg-fuchsia-50 px-3 py-1 rounded-full border border-fuchsia-100">
                                                {q.tema}
                                            </span>
                                        </div>

                                        <div className="p-6 md:p-8">
                                            <h3 className="text-xl md:text-2xl font-medium text-slate-800 leading-relaxed mb-8">
                                                {q.pregunta}
                                            </h3>

                                            <div className="space-y-4">
                                                {q.opciones.map((opcion, oIndex) => (
                                                    <button
                                                        key={oIndex}
                                                        onClick={() => handleAnswer(qIndex, oIndex)}
                                                        disabled={isAnswered}
                                                        className={`w-full text-left p-5 rounded-xl transition-all font-medium flex items-start gap-4 ${getAnswerColor(qIndex, oIndex)} ${!isAnswered ? 'cursor-pointer hover:-translate-y-1' : 'cursor-default'}`}
                                                    >
                                                        <span className="flex-shrink-0 mt-0.5 font-bold opacity-70 text-lg">
                                                            {String.fromCharCode(65 + oIndex)})
                                                        </span>
                                                        <span className="flex-1 leading-relaxed text-lg">{opcion}</span>
                                                        
                                                        {isAnswered && oIndex === q.correctIndex && (
                                                            <i className="fa-solid fa-circle-check text-emerald-500 flex-shrink-0 text-2xl mt-0.5"></i>
                                                        )}
                                                        {isAnswered && quizAnswers[qIndex] === oIndex && oIndex !== q.correctIndex && (
                                                            <i className="fa-solid fa-circle-xmark text-rose-500 flex-shrink-0 text-2xl mt-0.5"></i>
                                                        )}
                                                    </button>
                                                ))}
                                            </div>

                                            {isAnswered && (
                                                <div className={`mt-8 p-6 rounded-2xl border ${
                                                    quizAnswers[qIndex] === q.correctIndex 
                                                        ? 'bg-emerald-50 border-emerald-100' 
                                                        : 'bg-indigo-50 border-indigo-100'
                                                } animate-fade-in-up`}>
                                                    <div className="flex items-start gap-4">
                                                        <div className={`p-3 rounded-full flex-shrink-0 ${quizAnswers[qIndex] === q.correctIndex ? 'bg-emerald-100' : 'bg-indigo-100'}`}>
                                                            {quizAnswers[qIndex] === q.correctIndex ? 
                                                                <i className="fa-solid fa-star text-emerald-600 text-xl"></i> : 
                                                                <i className="fa-solid fa-circle-info text-indigo-600 text-xl"></i>
                                                            }
                                                        </div>
                                                        <div className="pt-0.5">
                                                            <h4 className={`font-bold text-lg mb-1 ${quizAnswers[qIndex] === q.correctIndex ? 'text-emerald-800' : 'text-indigo-800'}`}>
                                                                {quizAnswers[qIndex] === q.correctIndex ? '¡Excelente Análisis!' : 'Repaso de Concepto'}
                                                            </h4>
                                                            <p className={`leading-relaxed text-lg ${quizAnswers[qIndex] === q.correctIndex ? 'text-emerald-700' : 'text-indigo-700'}`}>
                                                                {q.explicacion}
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <main>
                    {activeSection === 'inicio' && <InicioView />}
                    {activeSection === 'conceptos' && <ConceptosView />}
                    {activeSection === 'simulacro' && <SimulacroView />}
                </main>
            );
        }

        // Renderizado inicial de la aplicación React en el navegador
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
